spring.application.name=gpugrid

spring.datasource.url=jdbc:postgresql://localhost:5432/gpugrid
spring.datasource.username=gpugrid
spring.datasource.password=${DB_PASSWORD:shreya}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true

gpugrid.scheduler.strategy=FIFO
gpugrid.scheduler.poll-interval-ms=5000
gpugrid.mock.job-duration-minutes=2
gpugrid.reporting.hourly-rate-usd=2.50

spring.profiles.active=dev